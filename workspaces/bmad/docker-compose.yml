version: "3.9"

services:
  asr-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ASR_BACKEND=${ASR_BACKEND:-mock}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MOCK_TRANSCRIPT=${MOCK_TRANSCRIPT:-안녕하세요 이것은 모의 음성 인식 결과입니다}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
