version: "3.9"

services:
  asr-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ASR_BACKEND=mock
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./docs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - asr-api
